name: Format check

on:
  push:
    branches: [master]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install renv
        run: install.packages("renv")
        shell: Rscript {0}

      - name: Restore dependencies
        run: renv::restore()
        shell: Rscript {0}

      - name: Check formatting
        run: Rscript scripts/fmt.R --check
