name: Render cheatsheets

on:
  push:
    branches: [master]
    paths:
      - "cheatsheets/**"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            rmarkdown
            knitr
            dplyr
            tidyr
            stringr
            lubridate
            ggplot2
            readr
            readxl
            tidymodels
            testthat
            microbenchmark

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Render to PDF
        run: Rscript scripts/render-pdf.R

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheets-pdf
          path: cheatsheets/**/*.pdf
          retention-days: 30
